<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>La Bella Vita • Italian Restaurant</title>
<style>
  :root { --accent: #9c2a2a; }
  body { font-family: system-ui, sans-serif; margin:0; background:#f8f5f2; color:#1a1a1a; }
  .hero { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://picsum.photos/id/1015/2000/1200') center/cover; height:100dvh; display:flex; align-items:center; justify-content:center; text-align:center; color:white; }
  .hero h1 { font-size:4.5rem; margin:0; font-weight:700; }
  .content { max-width:1200px; margin:0 auto; padding:4rem 1.5rem; }
  .menu-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(300px,1fr)); gap:2rem; }
  .card { background:white; border-radius:16px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.1); }
  .card img { width:100%; height:240px; object-fit:cover; }
</style>
</head>
<body>

  <section class="hero">
    <div>
      <h1>La Bella Vita</h1>
      <p style="font-size:1.6rem;">Authentic Italian in Houston</p>
    </div>
  </section>

  <div class="content">
    <h2 style="text-align:center; margin-bottom:3rem;">Our Menu</h2>
    <div class="menu-grid">
      <div class="card">
        <img src="https://picsum.photos/id/292/600/400" alt="Pappardelle">
        <div style="padding:1.5rem;">
          <h3>Pappardelle Bolognese</h3>
          <p>$28 • Slow-cooked short rib ragu, fresh egg pasta</p>
        </div>
      </div>
      <div class="card">
        <img src="https://picsum.photos/id/431/600/400" alt="Osso Buco">
        <div style="padding:1.5rem;">
          <h3>Osso Buco Milanese</h3>
          <p>$42 • Braised veal shank, saffron risotto</p>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
